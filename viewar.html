<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Nathara AR</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    body, html { margin: 0; overflow: hidden; }
    video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; }
    canvas { position: fixed; top: 0; left: 0; }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.z = 1;

let glasses;

// تحميل النظارة
const loader = new THREE.GLTFLoader();
loader.load("https://raw.githubusercontent.com/mohammed20302030/nathara/main/models/wayfarer_tortoise.glb", (gltf) => {
    glasses = gltf.scene;
    glasses.scale.set(0.015, 0.015, 0.015); // مقاس يونيسكس
    scene.add(glasses);
});

// تشغيل الكاميرا
navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
    video.srcObject = stream;
});

// Mediapipe FaceMesh
const faceMesh = new FaceMesh.FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

faceMesh.onResults((results) => {
    if (!results.multiFaceLandmarks[0] || !glasses) return;

    const lm = results.multiFaceLandmarks[0];

    // نقاط الأنف + العينين
    const nose = lm[1];
    const leftEye = lm[33];
    const rightEye = lm[263];

    // حساب موقع النظارة
    const x = (nose.x - 0.5) * 2;
    const y = -(nose.y - 0.5) * 2;

    glasses.position.set(x, y + 0.15, -0.8);

    // تدوير النظارة حسب ميلان الرأس
    const dx = leftEye.x - rightEye.x;
    const dy = leftEye.y - rightEye.y;
    const angle = Math.atan2(dy, dx);

    glasses.rotation.set(0, 0, -angle);
});

const cameraFeed = new CameraUtils.Camera(video, {
    onFrame: async () => {
        await faceMesh.send({ image: video });
        renderer.render(scene, camera);
    }
});
cameraFeed.start();
</script>

</body>
</html>
