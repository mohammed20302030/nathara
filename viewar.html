<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Nathara AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        model-viewer { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<model-viewer
    src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Avocado/glTF/Avocado.gltf"
    alt="AR Glasses"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate>
</model-viewer>

</body>
</html>
